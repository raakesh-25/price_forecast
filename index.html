<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forecast Plots Slider</title>

  <!-- Swiper CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
  />

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .swiper {
      width: 100%;
      height: 100vh; /* Full height for PPT Web Viewer */
    }

    .swiper-slide {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .swiper-slide img {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
      border: 1px solid #ccc;
      background: white;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="swiper">
    <div class="swiper-wrapper">

      <!-- Add your 20 plots here -->
      <div class="swiper-slide"><img src="09_11_2025.png" /></div>
      <div class="swiper-slide"><img src="10_11_2025.png" /></div>
      <div class="swiper-slide"><img src="11_11_2025.png" /></div>
      <div class="swiper-slide"><img src="12_11_2025.png" /></div>
      <div class="swiper-slide"><img src="13_11_2025.png" /></div>
      <div class="swiper-slide"><img src="14_11_2025.png" /></div>
      <div class="swiper-slide"><img src="15_11_2025.png" /></div>
      <div class="swiper-slide"><img src="16_11_2025.png" /></div>
      <div class="swiper-slide"><img src="17_11_2025.png" /></div>
      <div class="swiper-slide"><img src="18_11_2025.png" /></div>
      <div class="swiper-slide"><img src="19_11_2025.png" /></div>
      <div class="swiper-slide"><img src="20_11_2025.png" /></div>
      <div class="swiper-slide"><img src="21_11_2025.png" /></div>
      <div class="swiper-slide"><img src="22_11_2025.png" /></div>
      <div class="swiper-slide"><img src="23_11_2025.png" /></div>
      <div class="swiper-slide"><img src="24_11_2025.png" /></div>
      <div class="swiper-slide"><img src="25_11_2025.png" /></div>
      <div class="swiper-slide"><img src="26_11_2025.png" /></div>
      <div class="swiper-slide"><img src="27_11_2025.png" /></div>
      <div class="swiper-slide"><img src="28_11_2025.png" /></div>
      <div class="swiper-slide"><img src="29_11_2025.png" /></div>

    </div>

    <!-- Navigation arrows -->
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>

    <!-- Pagination dots -->
    <div class="swiper-pagination"></div>
  </div>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    const swiper = new Swiper(".swiper", {
      loop: false,
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
      pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },
      keyboard: {
        enabled: true,
      },
    });
  </script>
</body>
</html>
