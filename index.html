<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forecast Plots Slider</title>

  <!-- Swiper CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
  />

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .swiper {
      width: 100%;
      height: 100vh; /* Full height for PPT Web Viewer */
    }

    .swiper-slide {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .swiper-slide img {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
      border: 1px solid #ccc;
      background: white;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="swiper">
    <div class="swiper-wrapper">

      <!-- Add your 20 plots here -->
      <div class="swiper-slide"><img src="plot1.png" /></div>
      <div class="swiper-slide"><img src="plot2.png" /></div>
      <div class="swiper-slide"><img src="plot3.png" /></div>
      <div class="swiper-slide"><img src="plot4.png" /></div>
      <div class="swiper-slide"><img src="plot5.png" /></div>
      <div class="swiper-slide"><img src="plot6.png" /></div>
      <div class="swiper-slide"><img src="plot7.png" /></div>
      <div class="swiper-slide"><img src="plot8.png" /></div>
      <div class="swiper-slide"><img src="plot9.png" /></div>
      <div class="swiper-slide"><img src="plot10.png" /></div>
      <div class="swiper-slide"><img src="plot11.png" /></div>
      <div class="swiper-slide"><img src="plot12.png" /></div>
      <div class="swiper-slide"><img src="plot13.png" /></div>
      <div class="swiper-slide"><img src="plot14.png" /></div>
      <div class="swiper-slide"><img src="plot15.png" /></div>
      <div class="swiper-slide"><img src="plot16.png" /></div>
      <div class="swiper-slide"><img src="plot17.png" /></div>
      <div class="swiper-slide"><img src="plot18.png" /></div>
      <div class="swiper-slide"><img src="plot19.png" /></div>
      <div class="swiper-slide"><img src="plot20.png" /></div>

    </div>

    <!-- Navigation arrows -->
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>

    <!-- Pagination dots -->
    <div class="swiper-pagination"></div>
  </div>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    const swiper = new Swiper(".swiper", {
      loop: false,
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
      pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },
      keyboard: {
        enabled: true,
      },
    });
  </script>
</body>
</html>
